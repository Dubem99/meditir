name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API · typecheck + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meditir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meditir_test
      PHI_ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
    defaults:
      run:
        working-directory: meditir-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: meditir-api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck (src + tests)
        run: npx tsc --noEmit -p tsconfig.test.json
      - name: Production build
        run: npm run build
      - name: Integration tests
        run: npm run test:ci

  web:
    name: Web · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meditir-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: meditir-web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
